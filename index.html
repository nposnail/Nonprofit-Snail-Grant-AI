const CSS = ’\n@import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600&display=swap');\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{background:#0b1512;min-height:100vh}\ninput,textarea,select{font-family:'Instrument Sans',sans-serif;outline:none}\ninput::placeholder,textarea::placeholder{color:#6a8c80;opacity:.7}\nbutton{cursor:pointer;font-family:'Instrument Sans',sans-serif}\n.fi{width:100%;background:#162018;border:1.5px solid #1e3028;border-radius:10px;\n  padding:.75rem 1rem;color:#e8f4f0;font-size:.9rem;\n  transition:border-color .2s,box-shadow .2s;resize:vertical}\n.fi:focus{border-color:#1a7f74;box-shadow:0 0 0 3px rgba(26,127,116,.12)}\n.lbl{display:block;font-size:.7rem;font-weight:600;color:#c8a84b;\n  letter-spacing:.12em;text-transform:uppercase;margin-bottom:.4rem}\n.opt{color:#6a8c80;font-weight:400;text-transform:none;letter-spacing:0;font-size:.7rem}\n.btn-p{background:linear-gradient(135deg,#1a7f74,#22a898);color:#fff;border:none;\n  border-radius:10px;padding:.8rem 1.8rem;font-weight:600;font-size:.9rem;\n  letter-spacing:.02em;transition:opacity .2s,transform .1s;\n  box-shadow:0 4px 20px rgba(26,127,116,.25)}\n.btn-p:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}\n.btn-p:disabled{opacity:.3;cursor:not-allowed}\n.btn-g{background:transparent;color:#4dbfb2;border:1.5px solid #2a4238;border-radius:10px;\n  padding:.7rem 1.4rem;font-size:.88rem;transition:background .2s,border-color .2s}\n.btn-g:hover{background:rgba(26,127,116,.08);border-color:#1a7f74}\n.btn-sm{padding:.5rem 1rem;font-size:.8rem;border-radius:8px}\n.chip{padding:.4rem .85rem;border-radius:20px;font-size:.78rem;transition:all .2s;border:1.5px solid}\n.chip-on{background:rgba(26,127,116,.18);border-color:#22a898;color:#4dbfb2}\n.chip-off{background:#162018;border-color:#1e3028;color:#6a8c80}\n.tab{padding:.5rem 1rem;border-radius:8px;font-size:.82rem;font-weight:500;border:none;transition:all .2s}\n.tab-on{background:#1a7f74;color:#fff}\n.tab-off{background:#162018;color:#6a8c80}\n.tab-off:hover{background:#1e3028}\n@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}\n.fu{animation:fadeUp .35s ease forwards}\n@keyframes spin{to{transform:rotate(360deg)}}\n.spin{animation:spin .75s linear infinite;display:inline-block}\n@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}\n.pulse{animation:pulse 1.4s ease infinite}\n@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}\n.shake{animation:shake .3s ease}\n.prog-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;\n  justify-content:center;font-size:.75rem;flex-shrink:0;transition:all .3s}\n.prog-dot.done{background:rgba(26,127,116,.25);border:1.5px solid #1a7f74;color:#22a898}\n.prog-dot.active{background:rgba(26,127,116,.12);border:1.5px solid #22a898;color:#4dbfb2}\n.prog-dot.idle{background:#162018;border:1.5px solid #1e3028;color:#6a8c80}\n.hist-card{background:#162018;border:1.5px solid #1e3028;border-radius:10px;\n  padding:1rem 1.25rem;transition:border-color .2s,background .2s}\n.hist-card:hover{border-color:#2a4238;background:rgba(26,127,116,.05)}\n.score-ring{width:68px;height:68px;border-radius:50%;display:flex;flex-direction:column;\n  align-items:center;justify-content:center;border:3px solid;font-family:'Instrument Serif',serif}\n.gen-step{display:flex;align-items:center;gap:.75rem;padding:.65rem 0;\n  border-bottom:1px solid #1e3028}\n.gen-step:last-child{border-bottom:none}\n.gen-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;\n  justify-content:center;font-size:.65rem;flex-shrink:0}\n.gen-icon.done{background:rgba(26,127,116,.2);color:#22a898}\n.gen-icon.active{background:rgba(200,168,75,.15);color:#c8a84b}\n.gen-icon.idle{background:#1e3028;color:#6a8c80}\n\n/* Editable output */\n.edit-area{width:100%;background:transparent;border:none;color:#2a3a34;\n  font-family:'Instrument Sans',sans-serif;font-size:.93rem;line-height:1.9;\n  resize:none;padding:0;min-height:300px}\n.edit-area:focus{outline:none}\n.wc-bar{display:flex;align-items:center;gap:.5rem;font-size:.75rem;padding:.5rem .75rem;\n  border-radius:8px;margin-bottom:.5rem}\n.wc-ok{background:rgba(26,127,116,.1);color:#22a898;border:1px solid rgba(26,127,116,.2)}\n.wc-warn{background:rgba(200,168,75,.1);color:#c8a84b;border:1px solid rgba(200,168,75,.2)}\n.wc-over{background:rgba(192,57,43,.1);color:#e07070;border:1px solid rgba(192,57,43,.2)}\n\n/* Funder match */\n.match-card{border-radius:10px;padding:1.25rem;border:1.5px solid;transition:border-color .2s,transform .2s}\n.match-card:hover{transform:translateY(-2px)}\n.match-strong{background:rgba(26,127,116,.1);border-color:rgba(26,127,116,.4)}\n.match-moderate{background:rgba(200,168,75,.08);border-color:rgba(200,168,75,.3)}\n.match-weak{background:rgba(192,57,43,.06);border-color:rgba(192,57,43,.25)}\n\n/* Share modal */\n.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(4px);\n  display:flex;align-items:center;justify-content:center;z-index:1000;padding:1.5rem}\n.modal{background:#111e18;border:1.5px solid #2a4238;border-radius:16px;\n  padding:2rem;width:100%;max-width:500px}\n\n/* Review mode (read-only shared view) */\n.review-banner{background:rgba(200,168,75,.12);border-bottom:1.5px solid rgba(200,168,75,.25);\n  padding:.75rem 1.5rem;display:flex;align-items:center;gap:.75rem;font-size:.85rem;color:#c8a84b}\n’;

/* ═══════════════════════════════════════════════════════════
HELPERS
═══════════════════════════════════════════════════════════ */
const hashCode = async (str) => {
const buf = await crypto.subtle.digest(“SHA-256”, new TextEncoder().encode(str));
return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,“0”)).join(””);
};

const callClaude = async (prompt, system=””, maxTokens=3000) => {
const body = { model:“claude-sonnet-4-20250514”, max_tokens:maxTokens, messages:[{role:“user”,content:prompt}] };
if (system) body.system = system;
const res = await fetch(“https://api.anthropic.com/v1/messages”, {
method:“POST”, headers:{“Content-Type”:“application/json”}, body:JSON.stringify(body)
});
if (!res.ok) throw new Error(`API ${res.status}`);
const data = await res.json();
return data.content?.map(c=>c.text||””).join(””) || “”;
};

const countWords = (text) => text.trim().split(/\s+/).filter(Boolean).length;
const scoreColor = s => s>=75?”#22a898”:s>=50?”#c8a84b”:”#e07070”;
const matchColor = s => s===“Strong”?“rgba(26,127,116,.7)”:s===“Moderate”?“rgba(200,168,75,.7)”:“rgba(192,57,43,.6)”;
const matchClass = s => s===“Strong”?“match-strong”:s===“Moderate”?“match-moderate”:“match-weak”;

const stripMd = (text) => text.replace(/^#+\s*/gm,””).replace(/**/g,””).trim();

const renderMd = (text) => text
.replace(/^## (.+)$/gm,`<h2 style="font-family:'Instrument Serif',serif;font-size:1.2rem;color:#1a7f74;margin:2rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid #ede8e0">$1</h2>`)
.replace(/^### (.+)$/gm,`<h3 style="font-size:.9rem;font-weight:600;color:#1e2d28;margin:1.2rem 0 .3rem;text-transform:uppercase;letter-spacing:.06em">$1</h3>`)
.replace(/**(.+?)**/g,`<strong style="color:#1e2d28">$1</strong>`)
.replace(/\n\n/g,`</p><p style="margin:0 0 .9rem;line-height:1.9;font-size:.93rem;color:#2a3a34">`)
.replace(/\n/g,”<br/>”);

const SECTIONS = [
{id:“executive_summary”,       label:“Executive Summary”},
{id:“statement_of_need”,       label:“Statement of Need”},

];

const STEPS = [
{id:“match”,   label:“Funder Match”,      icon:“🎯”},
{id:“org”,     label:“Your Organization”, icon:“🏛”},
{id:“funder”,  label:“Funder & RFP”,      icon:“📋”},
{id:“program”, label:“Your Program”,      icon:“🌱”},
{id:“build”,   label:“Build & Generate”,  icon:“✨”},
];

/* ═══════════════════════════════════════════════════════════
WORD COUNT BAR
═══════════════════════════════════════════════════════════ */
const WordCountBar = ({text, limit}) => {
if (!limit) return null;
const wc = countWords(text);
const pct = Math.min((wc/limit)*100, 100);
const cls = wc > limit ? “wc-over” : wc > limit*0.9 ? “wc-warn” : “wc-ok”;
const label = wc > limit ? `⚠ ${wc-limit} words over limit` : wc > limit*0.9 ? `${limit-wc} words remaining` : `${wc} / ${limit} words`;
return (
<div className={`wc-bar ${cls}`}>
<div style={{flex:1,height:4,background:“rgba(255,255,255,.1)”,borderRadius:2,overflow:“hidden”}}>
<div style={{width:`${pct}%`,height:“100%”,background:“currentColor”,borderRadius:2,transition:“width .3s”}}/>
</div>
<span style={{whiteSpace:“nowrap”,flexShrink:0}}>{label}</span>
</div>
);
};

/* ═══════════════════════════════════════════════════════════
ACCESS GATE
═══════════════════════════════════════════════════════════ */
const AccessGate = ({onUnlock}) => {
const [input,setInput]=useState(””); const [error,setError]=useState(””); const [busy,setBusy]=useState(false); const [show,setShow]=useState(false);
const verify = async () => {
const code=input.trim().toUpperCase(); if(!code)return;
setBusy(true); setError(””);
const match=VALID_CODES.find(c=>c.code===code);
if(!match){setError(“Invalid code. Check your purchase confirmation email.”);setBusy(false);return;}
const key=`gwi-usage-${await hashCode(code)}`; let used=0;
try{const sv=localStorage.getItem(key);used=sv?parseInt(sv)||0:0;}catch{}
if(match.uses!==-1&&used>=match.uses){setError(`This code has used all ${match.uses} generations. Purchase a new license.`);setBusy(false);return;}
onUnlock({code,label:match.label,uses:match.uses,used,key}); setBusy(false);
};
return (
<div style={{minHeight:“100vh”,background:`radial-gradient(ellipse 80% 60% at 50% 0%,rgba(26,127,116,.15),transparent 70%),${T.bg}`,display:“flex”,alignItems:“center”,justifyContent:“center”,padding:“2rem”,fontFamily:”‘Instrument Sans’,sans-serif”}}>
<style>{CSS}</style>
<div className=“fu” style={{width:“100%”,maxWidth:400,background:T.panel,border:`1.5px solid ${T.borderL}`,borderRadius:18,padding:“2.5rem”,textAlign:“center”}}>
<div style={{width:60,height:60,borderRadius:“50%”,background:“rgba(26,127,116,.12)”,border:`1.5px solid ${T.borderL}`,display:“flex”,alignItems:“center”,justifyContent:“center”,margin:“0 auto 1.5rem”,fontSize:“1.5rem”}}>🔐</div>
<div style={{fontSize:”.68rem”,letterSpacing:”.2em”,color:T.gold,textTransform:“uppercase”,marginBottom:”.5rem”}}>Licensed Access</div>
<h1 style={{fontFamily:”‘Instrument Serif’,serif”,fontSize:“1.7rem”,color:T.ink,marginBottom:”.4rem”,fontWeight:400}}>Grant Writing <em style={{color:T.greenXL}}>Intelligence</em></h1>
<p style={{color:T.muted,fontSize:”.85rem”,marginBottom:“1.75rem”,lineHeight:1.65}}>Enter the access code from your purchase confirmation email.</p>
<div style={{position:“relative”,marginBottom:”.6rem”}}>
<input className=“fi” placeholder=“GRANT-XXXX-XXXX” value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key===“Enter”&&verify()} type={show?“text”:“password”} style={{textAlign:“center”,letterSpacing:”.08em”,textTransform:“uppercase”,paddingRight:“3.5rem”}}/>
<button onClick={()=>setShow(s=>!s)} style={{position:“absolute”,right:“1rem”,top:“50%”,transform:“translateY(-50%)”,background:“none”,border:“none”,color:T.muted,fontSize:”.8rem”}}>{show?“Hide”:“Show”}</button>
</div>
{error&&<div className=“shake” style={{color:T.red,fontSize:”.8rem”,padding:”.6rem”,background:T.redBg,border:`1px solid ${T.redBorder}`,borderRadius:8,marginBottom:”.6rem”}}>{error}</div>}
<button className=“btn-p” onClick={verify} disabled={!input.trim()||busy} style={{width:“100%”,marginTop:”.4rem”}}>
{busy?<><span className="spin">⟳</span> Verifying…</>:“Unlock Access →”}
</button>
<div style={{marginTop:“1.5rem”,padding:”.85rem”,background:T.card,borderRadius:8,border:`1px solid ${T.border}`}}>
<p style={{fontSize:”.75rem”,color:T.muted,lineHeight:1.6}}>Don’t have a code?{” “}<a href=“YOUR_GUMROAD_PRO_LINK” target=”_blank” rel=“noopener noreferrer” style={{color:T.greenXL,textDecoration:“none”}}>Purchase a license →</a></p>
</div>
</div>
</div>
);
};

<a href=“YOUR_LANDING_PAGE_URL” target=”_blank” rel=“noopener noreferrer” style={{background:`linear-gradient(135deg,${T.green},${T.greenL})`,color:”#fff”,textDecoration:“none”,padding:”.65rem 1.3rem”,borderRadius:8,fontSize:”.82rem”,fontWeight:600,whiteSpace:“nowrap”}}>Get Access →</a>

/* ═══════════════════════════════════════════════════════════
HISTORY PANEL
═══════════════════════════════════════════════════════════ */
const HistoryPanel = ({history,onLoad,onDelete}) => {
if(!history.length) return (
<div style={{textAlign:“center”,padding:“3rem”,color:T.muted,fontSize:”.88rem”}}>
<div style={{fontSize:“2.5rem”,marginBottom:”.75rem”,opacity:.3}}>📂</div>
No saved proposals yet. Generated proposals appear here automatically.
</div>
);
return (
<div style={{display:“flex”,flexDirection:“column”,gap:”.6rem”}}>
{history.map(h=>(
<div key={h.id} className="hist-card">
<div style={{display:“flex”,justifyContent:“space-between”,alignItems:“flex-start”,gap:”.5rem”}}>
<div style={{flex:1,minWidth:0}}>
<div style={{fontSize:”.9rem”,fontWeight:600,color:T.ink,marginBottom:”.2rem”,whiteSpace:“nowrap”,overflow:“hidden”,textOverflow:“ellipsis”}}>{h.programName||“Untitled”}</div>
<div style={{fontSize:”.75rem”,color:T.muted}}>{h.funderName||“No funder”} · {new Date(h.savedAt).toLocaleDateString()}</div>
</div>
<div style={{display:“flex”,gap:”.4rem”,flexShrink:0}}>
<button className=“btn-g btn-sm” onClick={()=>onLoad(h)}>Load</button>
<button onClick={()=>onDelete(h.id)} style={{background:“none”,border:“none”,color:T.muted,fontSize:“1rem”,padding:”.3rem .5rem”,lineHeight:1}}>✕</button>
</div>

          <textarea className="fi" rows={6} placeholder="Paste the full grant RFP or funder guidelines here. The more context you give, the more precisely the tool tailors your proposal." value={form.rfpText} onChange={e=>upd("rfpText",e.target.value)}/>
          {form.rfpText&&<div style={{marginTop:".5rem",fontSize:".75rem",color:T.greenXL}}>✓ RFP detected — full alignment analysis enabled</div>}
        </>}

        {/* ── Step 3: Program ── */}
        {step===3&&<>
          <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"1.25rem",marginBottom:"1.5rem"}}>Describe your program</h2>
          <label className="lbl">Program / Project Name *</label>
          <input className="fi" placeholder="e.g. Pathways to Workforce Readiness" value={form.programName} onChange={e=>upd("programName",e.target.value)} style={{marginBottom:"1rem"}}/>
          <label className="lbl">Program Description *</label>
          <textarea className="fi" rows={4} placeholder="What does the program do? How does it work? Who delivers it? The more specific you are here, the stronger your proposal will be." value={form.programDesc} onChange={e=>upd("programDesc",e.target.value)} style={{marginBottom:"1rem"}}/>
          <label className="lbl">Intended Outcomes & Impact <span className="opt">(recommended)</span></label>
          <textarea className="fi" rows={2} placeholder="e.g. 80% of participants secure employment within 6 months; 200 youth served annually" value={form.outcomes} onChange={e=>upd("outcomes",e.target.value)} style={{marginBottom:"1rem"}}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem"}}>
            <div>
              <label className="lbl">Target Population <span className="opt">(optional)</span></label>
              <input className="fi" placeholder="e.g. Adults 18–35" value={form.targetPop} onChange={e=>upd("targetPop",e.target.value)}/>
            </div>
            <div>
              <label className="lbl">Geography <span className="opt">(optional)</span></label>
              <input className="fi" placeholder="e.g. South Side Chicago, IL" value={form.geography} onChange={e=>upd("geography",e.target.value)}/>
            </div>
          </div>
        </>}

        {/* ── Step 4: Build ── */}
        {step===4&&<>
          <h2 style={{fontFamily:"'Instrument Serif',serif",fontSize:"1.25rem",marginBottom:".4rem"}}>Choose sections & word limits</h2>
          <p style={{color:T.muted,fontSize:".83rem",marginBottom:"1.25rem"}}>Select sections and optionally set word limits — the tool will write each section to your exact requirements.</p>

          {/* Section picker with optional word limits */}
          <div style={{display:"flex",flexDirection:"column",gap:".5rem",marginBottom:"1.5rem"}}>
            {SECTIONS.map(s=>{
              const isOn=form.sections.includes(s.id);
              return (
                <div key={s.id} style={{display:"flex",alignItems:"center",gap:".75rem",padding:".6rem .85rem",background:isOn?"rgba(26,127,116,.08)":T.card,border:`1.5px solid ${isOn?T.borderL:T.border}`,borderRadius:10,transition:"all .2s"}}>
                  <button className={`chip ${isOn?"chip-on":"chip-off"}`} onClick={()=>toggleSection(s.id)} style={{flexShrink:0,whiteSpace:"nowrap"}}>
                    {isOn?"✓ ":""}{s.label}
                  </button>
                  {isOn&&(
                    <div style={{display:"flex",alignItems:"center",gap:".4rem",marginLeft:"auto"}}>
                      <span style={{fontSize:".72rem",color:T.muted,whiteSpace:"nowrap"}}>Word limit:</span>
                      <input
                        type="number"
                        placeholder="none"
                        value={form.wordLimits[s.id]||""}
                        onChange={e=>setWordLimit(s.id,e.target.value)}
                        style={{width:70,background:T.card,border:`1px solid ${T.border}`,borderRadius:6,padding:".3rem .5rem",color:T.ink,fontSize:".8rem",textAlign:"center"}}
                      />
                    </div>
                  )}
                </div>
              );
            })}
          </div>

          {/* Live generation progress */}
          {isGenerating&&(
            <div style={{background:T.card,border:`1.5px solid ${T.borderL}`,borderRadius:12,padding:"1.25rem",marginBottom:"1.25rem"}}>
              <div style={{fontSize:".72rem",color:T.gold,marginBottom:".9rem",fontWeight:600,letterSpacing:".08em",textTransform:"uppercase"}}>Building your grant package...</div>
              {genSteps.map(g=>(
                <div key={g.id} className="gen-step">
                  <div className={`gen-icon ${g.status}`}>{g.status==="done"?"✓":g.status==="active"?<span className="spin" style={{fontSize:".7rem"}}>⟳</span>:"·"}</div>
                  <span style={{color:g.status==="done"?T.greenXL:g.status==="active"?T.gold:T.muted,fontSize:".85rem",transition:"color .3s"}}>{g.label}</span>
                  {g.status==="done"&&<span style={{marginLeft:"auto",fontSize:".7rem",color:T.green}}>✓ Done</span>}
                  {g.status==="active"&&<span className="pulse" style={{marginLeft:"auto",fontSize:".7rem",color:T.gold}}>Working...</span>}
                </div>
              ))}
            </div>
          )}

          {error&&<div style={{background:T.redBg,border:`1px solid ${T.redBorder}`,borderRadius:8,padding:".75rem 1rem",color:T.red,fontSize:".88rem",marginBottom:"1rem"}}>{error}</div>}

          {!isGenerating&&(
            <button className="btn-p" style={{width:"100%"}} onClick={generate} disabled={form.sections.length===0}>
              ✨ Generate Full Grant Package
            </button>
          )}

          {/* Analysis */}
          {analysis&&!isGenerating&&(
            <div style={{marginTop:"1.5rem"}} className="fu">
              <div style={{fontSize:".68rem",color:T.muted,textTransform:"uppercase",letterSpacing:".1em",marginBottom:".75rem",fontWeight:600}}>Pre-Generation Analysis</div>
              <div style={{display:"flex",justifyContent:"center",gap:"3rem",marginBottom:"1.25rem",padding:"1.25rem",background:T.card,borderRadius:10,border:`1px solid ${T.border}`}}>
                <ScoreRing score={analysis.readinessScore} label="Readiness"/>
                <ScoreRing score={analysis.alignmentScore} label="Alignment"/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".6rem",marginBottom:".75rem"}}>
                <div style={{background:"rgba(26,127,116,.07)",border:"1px solid rgba(26,127,116,.18)",borderRadius:8,padding:".9rem"}}>
                  <div style={{fontSize:".65rem",color:T.green,textTransform:"uppercase",letterSpacing:".1em",marginBottom:".35rem",fontWeight:600}}>Strengths</div>
                  {analysis.strengths?.map((s,i)=><div key={i} style={{fontSize:".78rem",color:"#b8d8c8",padding:".25rem 0",borderBottom:`1px solid ${T.border}`}}>{s}</div>)}
                </div>
                <div style={{background:"rgba(192,57,43,.05)",border:"1px solid rgba(192,57,43,.15)",borderRadius:8,padding:".9rem"}}>
                  <div style={{fontSize:".65rem",color:T.red,textTransform:"uppercase",letterSpacing:".1em",marginBottom:".35rem",fontWeight:600}}>Gaps to address</div>
                  {analysis.gaps?.map((g,i)=><div key={i} style={{fontSize:".78rem",color:"#e8a8a8",padding:".25rem 0",borderBottom:`1px solid ${T.border}`}}>{g}</div>)}
                </div>
              </div>
              <div style={{marginBottom:".75rem"}}>
                <div style={{fontSize:".65rem",color:T.muted,textTransform:"uppercase",letterSpacing:".1em",marginBottom:".5rem",fontWeight:600}}>Compliance Checklist</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:".3rem"}}>
                  {analysis.compliance?.map((c,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:".4rem",fontSize:".75rem"}}>
                      <span style={{color:c.status==="pass"?T.greenL:c.status==="warn"?T.gold:T.red}}>{c.status==="pass"?"✓":c.status==="warn"?"⚠":"✗"}</span>
                      <span style={{color:"#8ab0a0"}}>{c.item}</span>
                    </div>
                  ))}
                </div>
              </div>
              {analysis.toneKeywords?.length>0&&(
                <div>
                  <div style={{fontSize:".65rem",color:T.muted,textTransform:"uppercase",letterSpacing:".1em",marginBottom:".4rem",fontWeight:600}}>Funder keywords woven into your proposal</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:".35rem"}}>
                    {analysis.toneKeywords.map((k,i)=><span key={i} style={{padding:".25rem .65rem",borderRadius:20,background:"rgba(26,127,116,.12)",border:"1px solid rgba(26,127,116,.25)",fontSize:".72rem",color:T.greenXL}}>{k}</span>)}
                  </div>
                </div>
              )}
            </div>
          )}
        </>}

        {/* Nav */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:"2rem"}}>
          <button className="btn-g" onClick={()=>setStep(s=>s-1)} style={{visibility:step===0?"hidden":"visible"}}>← Back</button>
          {step<4&&<button className="btn-p" onClick={()=>setStep(s=>s+1)} disabled={!canProceed()}>Continue →</button>}
        </div>
      </div>

      {/* ── Output ── */}
      {currentOutput&&(
        <div ref={outputRef} style={{maxWidth:780,margin:"2rem auto 0"}} className="fu">

          {/* Tab bar + actions */}
          <div style={{display:"flex",gap:".4rem",marginBottom:".75rem",flexWrap:"wrap",alignItems:"center"}}>
            {[["proposal","📄 Full Proposal"],["coverLetter","✉ Cover Letter"],["summary","📌 Summary"]].map(([id,label])=>(
              <button key={id} className={`tab ${activeTab===id?"tab-on":"tab-off"}`} onClick={()=>setActiveTab(id)}>{label}</button>
            ))}
            <div style={{marginLeft:"auto",display:"flex",gap:".4rem",flexWrap:"wrap"}}>
              <button className="tab tab-off" onClick={()=>setIsEditing(e=>!e)} style={{color:isEditing?T.goldL:T.muted}}>
                {isEditing?"✓ Done Editing":"✏ Edit"}
              </button>
              <button className="tab tab-off" onClick={createShareLink}>🔗 Share</button>
              <button className="tab tab-off" onClick={exportPDF}>⬇ PDF</button>
            </div>
          </div>

          {/* Word count bar */}
          {isEditing&&<WordCountBar text={activeText} limit={activeLimit}/>}
          {!isEditing&&activeTab==="coverLetter"&&<WordCountBar text={activeText} limit={350}/>}
          {!isEditing&&activeTab==="summary"&&<WordCountBar text={activeText} limit={400}/>}

          {/* Edit mode indicator */}
          {isEditing&&(
            <div style={{fontSize:".75rem",color:T.gold,marginBottom:".5rem",padding:".4rem .75rem",background:"rgba(200,168,75,.08)",border:"1px solid rgba(200,168,75,.2)",borderRadius:6}}>
              ✏ Editing mode — changes are saved automatically. Click "Done Editing" when finished.
              {editedOutput&&<span style={{color:T.greenXL,marginLeft:".75rem"}}>✓ Custom version saved</span>}
            </div>
          )}

          {/* Content — editable or read-only */}
          <div style={{background:T.paper,border:`1.5px solid ${isEditing?"#b8c8b0":"#dde8e0"}`,borderRadius:14,padding:"2.5rem",color:T.textD,boxShadow:"0 4px 30px rgba(0,0,0,.18)",transition:"border-color .2s"}}>
            {isEditing ? (
              <textarea
                className="edit-area"
                value={activeText}
                onChange={e=>{
                  const updated={...(currentOutput),[activeTab]:e.target.value};
                  setEditedOutput(updated);
                }}
                style={{minHeight:400}}
              />
            ) : (
              <div style={{fontFamily:"'Instrument Sans',sans-serif",lineHeight:1.9,fontSize:".93rem"}}
                dangerouslySetInnerHTML={{__html:`<p style="margin:0 0 .9rem;line-height:1.9;font-size:.93rem;color:${T.textD}">${renderMd(activeText)}</p>`}}/>
            )}
          </div>

          {/* Bottom actions */}
          <div style={{display:"flex",gap:".6rem",marginTop:".9rem",flexWrap:"wrap",alignItems:"center"}}>
            <button className="btn-p btn-sm" onClick={()=>navigator.clipboard.writeText(activeText)}>Copy Text</button>
            <button className="btn-g btn-sm" onClick={generate} disabled={isGenerating}>↺ Regenerate</button>
            {editedOutput&&<button className="btn-g btn-sm" onClick={()=>{setEditedOutput(null);setIsEditing(false)}} style={{color:T.gold,borderColor:"rgba(200,168,75,.3)"}}>Reset to Original</button>}
            <button className="btn-g btn-sm" onClick={()=>{setStep(0);setOutput(null);setEditedOutput(null);setAnalysis(null);setFunderMatch(null);setIsEditing(false);setGenSteps(s=>s.map(g=>({...g,status:"idle"})));setForm({orgName:"",orgMission:"",orgHistory:"",orgBudget:"",funderName:"",funderFocus:"",grantAmount:"",rfpText:"",programName:"",programDesc:"",targetPop:"",geography:"",outcomes:"",sections:["executive_summary","statement_of_need","project_description","goals_objectives"],wordLimits:{}})}}>✦ New Proposal</button>
            <span style={{marginLeft:"auto",fontSize:".72rem",color:T.muted}}>✓ Auto-saved to History</span>
          </div>
        </div>
      )}
    </>
  )}

  <div style={{textAlign:"center",marginTop:"3rem",fontSize:".68rem",color:"rgba(255,255,255,.1)",letterSpacing:".12em"}}>
    GRANT WRITING INTELLIGENCE · POWERED BY AI · BUILT BY A NONPROFIT PROFESSIONAL
  </div>
</div>
```

);
};

function App() {
const [session,setSession]=useState(null);
if(!session) return <AccessGate onUnlock={setSession}/>;
return <GrantApp session={session}/>;
}

window.onerror = function(msg, src, line, col, err) {
document.getElementById(‘root’).innerHTML = ‘<div style="color:#e07070;font-family:sans-serif;padding:2rem;background:#0b1512;min-height:100vh"><h2>Loading Error</h2><p>’ + msg + ’</p><p>Line: ’ + line + ‘</p></div>’;
return true;
};

try {
const root = ReactDOM.createRoot(document.getElementById(‘root’));
root.render(React.createElement(App));
} catch(e) {
document.getElementById(‘root’).innerHTML = ‘<div style="color:#e07070;font-family:sans-serif;padding:2rem;background:#0b1512;min-height:100vh"><h2>App Error</h2><p>’ + e.message + ‘</p></div>’;
}
</script>

</body>
